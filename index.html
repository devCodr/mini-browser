    *, *::before, *::after {

    html, body {
      height: 100%;

    /* ===== TOOLBAR ===== */
    #toolbar {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 8px 12px;
      background: #13131a;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      min-height: 50px;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    #toolbar > * {
      -webkit-app-region: no-drag;
    }

    /* Nav buttons */
    .nav-btn {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      font-size: 14px;
      flex-shrink: 0;
      padding: 0;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .nav-btn:active {
      transform: scale(0.92);
      background: rgba(124, 90, 240, 0.25);
    }

    /* URL bar */
    #url {
      flex: 1;
      max-width: 400px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e6e6e6;
      font-size: 12px;
     font-family: system-ui, sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      display: none;
    }

    #url:focus {
      border-color: rgba(124, 90, 240, 0.6);
      background: rgba(124, 90, 240, 0.08);
    }

    #url::placeholder {
      color: rgba(255,255,255,0.3);
    }

    /* Add bookmark button */
    #newFav {
      background: rgba(124, 90, 240, 0.15);
      color: rgba(124, 90, 240, 1);
      border: 1px solid rgba(124, 90, 240, 0.3);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-size: 16px;
      flex-shrink: 0;
      padding: 0;
    }

    #newFav:hover {
      background: rgba(124, 90, 240, 0.28);
    }

    #newFav:active {
      transform: scale(0.92);
    }

    /* Content */
    #content {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    .webviews {
      flex: 1;
      position: relative;
    }

    .webviews webview {
      width: 100%;
      height: 100%;
      border: none;
      visibility: hidden;
      position: absolute;
      left: 0;
      top: 0;
    }

    .webviews webview.active {
      visibility: visible;
    }

    /* ===== BOOKMARKS BAR ===== */
    #bookmarks {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
      align-items: center;
      margin-left: auto;
      overflow: hidden;
    }

    .bookmark {
      display: inline-flex;
      align-items: center;
      position: relative;
      border-radius: 10px;
    }

    .bookmark:hover .bm-actions {
      opacity: 1;
      pointer-events: auto;
    }

    /* Main favicon button */
    .bm-main-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      padding: 0;
      flex-shrink: 0;
      position: relative;
    }

    .bm-main-btn img,
    .bm-main-btn svg {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      display: block;
    }

    .bm-main-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.13);
    }

    .bm-main-btn:active {
      transform: scale(0.92);
    }

    .bm-main-btn.active {
      background: rgba(124, 90, 240, 0.2);
      border-color: rgba(124, 90, 240, 0.5);
      box-shadow: 0 0 0 2px rgba(124, 90, 240, 0.2);
    }

    /* Hover action strip that appears below */
    .bm-actions {
      position: absolute;
      top: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2px;
      background: #1e1e2a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 3px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .bm-action-btn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      border-radius: 5px;
      width: 24px;
      height: 24px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }

    .bm-action-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .bm-action-btn.del {
      color: rgba(239, 68, 68, 0.6);
    }

    .bm-action-btn.del:hover {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    /* Dragging */
    .bookmark.dragging {
      opacity: 0.4;
    }

    /* ===== ICON MODAL ===== */
    #iconModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    #iconModal.open {
      display: flex;
    }

    .modal-inner {
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      width: 480px;
      max-width: 95%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    }

    .modal-inner h3 {
      margin: 0 0 16px 0;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    #iconSvgInput {
      width: 100%;

      font-size: 12px;
      font-family: monospace;
      padding: 10px 12px;
      outline: none;

    .modal-actions {
      display: flex;
      gap: 8px;

      margin-top: 14px;
    }

    .modal-btn {
      padding: 8px 18px;
