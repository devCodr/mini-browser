<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Mini Browser</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: sans-serif;

        }

        #toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 8px;
            background: #1b1b1c;
            border-bottom: 1px solid #2a2a2b;
        }

        button {
            background: #2a2a2b;
            color: #e6e6e6;
            border: 1px solid #3a3a3b;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
        }

        #url {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #3a3a3b;
            background: #121213;
            color: #e6e6e6;
            display: none;
            /* 🔹 oculta por defecto */
        }

        #content {
            flex: 1;
            display: flex;
            position: relative;
            height: 100%;
        }

        .webviews {
            flex: 1;
            position: relative;
            height: 100%;
        }

        .webviews webview {
            width: 100%;
            height: 100%;
            border: none;
            visibility: hidden;
            position: absolute;
            left: 0;
            top: 0;

        }

        .webviews webview.active {
            visibility: visible;
        }

        #bookmarks {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            margin-left: auto;

            button {
                display: grid;
                place-content: center;

                &:nth-child(1) {
                    padding: 3px;
                    width: 30px;
                    height: 30px;
                }

                &:nth-child(2),
                &:nth-child(3) {
                    position: absolute;

                    display: none;
                    padding: 0;
                    height: 12px;
                    left: 0;
                    width: 100%;
                }

                &:nth-child(2) {
                    top: 100%;
                    background-color: green;

                    border-radius: 0 0 4px 4px;
                }

                &:nth-child(3) {
                    bottom: 100%;

                    background-color: red;
                    border-radius: 0 0 4px 4px;
                }

                svg {
                    width: 22px;
                    aspect-ratio: 1/1;
                    margin: auto;
                }

                img {
                    border-radius: 4px;
                    display: block;
                    width: 100%;
                    height: auto;
                }
            }

            .bookmark button.active {
                outline: 2px solid #2a7fde;
            }

            .bookmark {
                display: inline-flex;
                align-items: center;
                gap: 2px;
                position: relative;

                &:hover {

                    button:nth-child(2),
                    button:nth-child(3) {
                        display: block;
                    }

                }
            }


        }
    </style>
</head>

<body>
    <div id="toolbar">
        <button id="back">⟵</button>
        <button id="home" title="Home">🏠</button>
        <button id="fwd">⟶</button>
        <button id="reload">⟳</button>
        <button id="newFav" title="Add Favorite">➕</button>
        <input id="url" type="text" placeholder="Enter URL to create new favorite" style="display:none;">


        <div id="bookmarks"></div>
    </div>
    <div id="content">
        <div class="webviews" id="webviews"></div>
    </div>
    <!-- Modal for editing bookmark icon -->
    <div id="iconModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
        <div style="background:#111; color:#eee; padding:16px; border-radius:8px; width:480px; max-width:95%;">
            <h3 style="margin-top:0;">Paste SVG icon</h3>
            <textarea id="iconSvgInput" placeholder="Paste SVG ICON code raw..."></textarea>
            <div style=" display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
                <button id="iconCancel">Cancel</button>
                <button id="iconSave">Save</button>
            </div>
        </div>
    </div>
    
    <!-- Lock Overlay (integrated within main window) -->
    <div id="lockOverlay" style="display:none; position:fixed; inset:0; background:#111; z-index:9999; align-items:center; justify-content:center; flex-direction:column;">
        <div style="width:360px; padding:24px; background:#1d1d1d; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,.6);">
            <img src="./icon.png" alt="Mini Browser" style="width:125px; height:auto; display:block; margin:auto auto 20px auto;">
            <h1 id="lockTitle" style="margin:0 0 12px 0; font-size:18px; text-align:center; color:#eee;">Enter PIN</h1>
            
            <input id="pinLogin" class="input" type="password" placeholder="PIN" inputmode="numeric" autofocus
                   style="width:100%; padding:12px; border-radius:8px; border:1px solid #333; background:#0f0f0f; color:#eee; font-size:16px; outline:none; margin-top:8px;">
            
            <input id="pinCurrent" class="input hidden" type="password" placeholder="Current PIN" inputmode="numeric"
                   style="width:100%; padding:12px; border-radius:8px; border:1px solid #333; background:#0f0f0f; color:#eee; font-size:16px; outline:none; margin-top:8px; display:none;">
            
            <input id="pinNew" class="input hidden" type="password" placeholder="New PIN (min 4 digits)" inputmode="numeric"
                   style="width:100%; padding:12px; border-radius:8px; border:1px solid #333; background:#0f0f0f; color:#eee; font-size:16px; outline:none; margin-top:8px; display:none;">
            
            <button id="lockOk" class="btn" style="width:100%; padding:12px; border:none; border-radius:8px; background:#2a7fde; color:#fff; font-size:16px; margin-top:12px; cursor:pointer;">Unlock</button>
            
            <div style="margin-top:8px; text-align:center; font-size:12px; color:#aaa;">
                <a id="lockSet" class="link" href="#" style="color:#fff; cursor:pointer;">Set PIN</a> •
                <a id="lockChange" class="link" href="#" style="color:#fff; cursor:pointer;">Change PIN</a>
            </div>
            
            <div id="lockError" style="color:red; text-align:center; margin-top:8px; display:none;"></div>
        </div>
    </div>
    
        <script src="renderer.js"></script>
</body>

</html>
