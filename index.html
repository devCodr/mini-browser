<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>MiniBrowser</title>
  <meta http-equiv="Content-Security-Policy" content="script-src 'self';">
  

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
      font-family: system-ui, sans-serif;
      background: #0d0d12;
      color: #e6e6e6;
    }

    /* ===== TOOLBAR ===== */
    #toolbar {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 8px 12px;
      background: #13131a;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      min-height: 50px;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }

    #toolbar > * {
      -webkit-app-region: no-drag;
    }

    /* Nav buttons */
    .nav-btn {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      font-size: 14px;
      flex-shrink: 0;
      padding: 0;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .nav-btn:active {
      transform: scale(0.92);
      background: rgba(124, 90, 240, 0.25);
    }

    /* URL bar */
    #url {
      flex: 1;
      max-width: 400px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e6e6e6;
      font-size: 12px;
     font-family: system-ui, sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      display: none;
    }

    #url:focus {
      border-color: rgba(124, 90, 240, 0.6);
      background: rgba(124, 90, 240, 0.08);
    }

    #url::placeholder {
      color: rgba(255,255,255,0.3);
    }

    /* Add bookmark button */
    #newFav {
      background: rgba(124, 90, 240, 0.15);
      color: rgba(124, 90, 240, 1);
      border: 1px solid rgba(124, 90, 240, 0.3);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-size: 16px;
      flex-shrink: 0;
      padding: 0;
    }

    #newFav:hover {
      background: rgba(124, 90, 240, 0.28);
    }

    #newFav:active {
      transform: scale(0.92);
    }

    /* Content */
    #content {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    .webviews {
      flex: 1;
      position: relative;
    }

    .webviews webview {
      width: 100%;
      height: 100%;
      border: none;
      visibility: hidden;
      position: absolute;
      left: 0;
      top: 0;
    }

    .webviews webview.active {
      visibility: visible;
    }

    /* ===== BOOKMARKS BAR ===== */
    #bookmarks {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
      align-items: center;
      margin-left: auto;
      overflow: hidden;
    }

    .bookmark {
      position: relative;
      cursor: pointer;
      border-radius: 10px;
    }

    /* Main favicon button */
    .bm-main-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      padding: 0;
      flex-shrink: 0;
      position: relative;
    }

    .bm-main-btn img,
    .bm-main-btn svg {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      display: block;
    }

    .bm-main-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.13);
    }

    .bm-main-btn:active {
      transform: scale(0.92);
    }

    .bm-main-btn.active {
      background: rgba(124, 90, 240, 0.2);
      border-color: rgba(124, 90, 240, 0.5);
      box-shadow: 0 0 0 2px rgba(124, 90, 240, 0.2);
    }

    /* Dragging */
    .bookmark.dragging {
      opacity: 0.4;
    }

    /* ===== ICON MODAL ===== */
    #iconModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    #iconModal.open {
      display: flex;
    }

    .modal-inner {
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      width: 480px;
      max-width: 95%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    }

    .modal-inner h3 {
      margin: 0 0 16px 0;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    #iconSvgInput {
      width: 100%;
      height: 160px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e6e6e6;
      font-size: 12px;
      font-family: monospace;
      padding: 10px 12px;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s;
    }

    #iconSvgInput:focus {
      border-color: rgba(124, 90, 240, 0.5);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .modal-btn {
      padding: 8px 18px;
      border-radius: 9px;
      font-size: 13px;
    font-family: system-ui, sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .modal-btn:active {
      transform: scale(0.97);
    }

    #iconCancel {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
    }

    #iconCancel:hover {
      background: rgba(255,255,255,0.11);
    }

    #iconSave {
      background: linear-gradient(135deg, #7c5af0, #5b35d9);
      border: none;
      color: #fff;
    }

    #iconSave:hover {
      opacity: 0.88;
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <button class="nav-btn" id="back" title="Atrás">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-btn" id="home" title="Inicio">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
    <button class="nav-btn" id="fwd" title="Adelante">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="nav-btn" id="reload" title="Recargar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>

    <input id="url" type="text" placeholder="Ingresa una URL para crear un favorito" style="display:none;">

    <button id="newFav" title="Agregar favorito">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <div id="bookmarks"></div>
  </div>

  <div id="content">
    <div class="webviews" id="webviews"></div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
